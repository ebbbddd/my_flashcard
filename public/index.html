<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>英语学习卡片</title>
    <meta name="theme-color" content="#f6f6f4" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="home-view" class="view is-active" aria-labelledby="home-title">
        <div class="topbar">
          <div>
            <p class="eyebrow">Feishu Reader</p>
            <h1 id="home-title">英语学习卡片</h1>
          </div>
          <button id="add-document-button" class="control-button primary" type="button">Upload Feishu files</button>
        </div>
        <button id="sync-button" class="sync-button" type="button" aria-label="同步移动端和电脑端内容" title="同步移动端和电脑端内容">同步</button>
        <div id="document-list" class="document-list"></div>
      </section>

      <section id="study-view" class="view" aria-labelledby="study-title">
        <div class="study-header">
          <button id="back-button" class="icon-button" type="button" aria-label="返回文档列表" title="返回文档列表">
            <span aria-hidden="true">←</span>
          </button>
          <div class="study-heading">
            <p id="study-section" class="eyebrow"></p>
            <h1 id="study-title"></h1>
          </div>
        </div>

        <div class="card-jump">
          <button
            id="progress-button"
            class="progress-pill"
            type="button"
            aria-haspopup="listbox"
            aria-expanded="false"
          ></button>
          <div id="card-jump-menu" class="card-jump-menu" role="listbox" aria-label="选择卡片序号"></div>
        </div>

        <div id="card-button" class="flashcard" role="button" tabindex="0" aria-live="polite">
          <span class="card-face card-front">
            <span class="card-label">中文</span>
            <span id="card-front-text" class="card-text"></span>
          </span>
          <span class="card-face card-back">
            <span class="card-label">English</span>
            <span id="card-back-text" class="card-text"></span>
          </span>
          <button id="speak-button" class="speak-button" type="button" title="朗读当前卡片">朗读</button>
          <button id="favorite-button" class="favorite-button" type="button" title="收藏当前卡片">收藏</button>
        </div>

        <div class="study-controls">
          <button id="prev-button" class="control-button" type="button">Previous</button>
          <span class="control-divider" aria-hidden="true"></span>
          <button id="next-button" class="control-button" type="button">Next</button>
        </div>
        <button id="flip-button" class="visually-hidden" type="button">翻面</button>
      </section>
    </main>

    <dialog id="add-document-dialog" class="modal">
      <form id="add-document-form" class="modal-panel" method="dialog">
        <div class="modal-header">
          <div>
            <p class="eyebrow">New Document</p>
            <h2>Upload</h2>
          </div>
          <button id="close-dialog-button" class="icon-button" type="button" aria-label="关闭" title="关闭">
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <label class="field">
          <span>飞书文档链接</span>
          <textarea
            id="document-url-input"
            autocomplete="off"
            inputmode="url"
            placeholder="https://bytedance.larkoffice.com/&#10;wiki/..."
            required
            rows="4"
          ></textarea>
        </label>
        <p id="document-form-error" class="form-error" role="alert"></p>
        <div class="modal-actions">
          <button class="control-button" type="button" id="cancel-dialog-button">Cancel</button>
          <button class="control-button primary" type="submit">Upload</button>
        </div>
      </form>
    </dialog>

    <dialog id="delete-document-dialog" class="modal delete-modal">
      <form id="delete-document-form" class="modal-panel" method="dialog">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Delete Document</p>
            <h2>删除文档</h2>
          </div>
        </div>
        <p id="delete-document-message" class="delete-message"></p>
        <div class="modal-actions">
          <button class="control-button" type="button" id="cancel-delete-document-button">取消</button>
          <button class="control-button primary danger" type="submit">删除</button>
        </div>
      </form>
    </dialog>

    <script src="./app.js" defer></script>
  </body>
</html>
